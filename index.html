<!DOCTYPE html>
<!--
  Trainline ES-IT GTM Calendar  ·  España + Italia
  ----------------------------------------------------------------------
  A painted Gantt/calendar for planning GTM marketing campaigns.

  This project is just three plain files — no build step, no framework:
    • index.html  — this file: the page skeleton (top bar + empty grid)
    • styles.css  — all the visual styling
    • app.js      — all the behaviour (load data, draw calendar, save)

  To run locally: open this file in a browser, or `python3 -m http.server`.
  Storage is Supabase; hosting is Netlify (git push auto-deploys).
  See CLAUDE.md for the full picture.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trainline ES & IT GTM Calendar</title>
<link rel="stylesheet" href="styles.css">

<!-- ── APP SHELL ───────────────────────────────────────────────────── -->
<div id="app">

  <!-- Top bar: brand, market tabs, date range, zoom, save status, lock -->
  <div class="topbar">
    <div class="brand">
      <div class="ico">T</div>
      <div class="bl"><span class="b1" id="brandTitle">Trainline ES &amp; IT GTM Calendar</span><span class="b2">Campaign &amp; channel tracker</span></div>
    </div>
    <div class="divider"></div>
    <div class="market-tabs">
      <button class="mtab active" data-action="switch-tab" data-tab="ES">🇪🇸 España</button>
      <button class="mtab" data-action="switch-tab" data-tab="IT">🇮🇹 Italia</button>
    </div>
    <div class="divider"></div>
    <div class="tools">
      <div class="rangebox">📅 <input type="date" id="fromDate"> → <input type="date" id="toDate"></div>
      <div class="seg">
        <button data-action="zoom-out">−</button>
        <div class="sp"></div>
        <button data-action="zoom-in">+</button>
      </div>
      <button class="btn" data-action="reload">⟳ Reload</button>
    </div>
    <div class="spacer"></div>
    <div class="save-ind synced" id="saveInd" title=""><span class="dot"></span><span class="stxt">Synced</span></div>
    <button class="btn" id="lockBtn" data-action="toggle-lock">🔒 View only — click to edit</button>
    <button class="btn primary" id="addBtn" data-action="add-campaign" style="display:none">+ New campaign</button>
  </div>

  <!-- Legend (channels + campaign colours) — filled in by app.js -->
  <div class="legendbar" id="legend"></div>

  <!-- The scrolling calendar grid — drawn by app.js into #grid -->
  <div class="scroll-wrap">
    <div class="scroll" id="scroll">
      <div class="grid" id="grid"></div>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div><span>Loading…</span>
    </div>
  </div>
</div>

<!-- Pop-up menus and modals are appended here by app.js -->
<div id="overlays"></div>

<!-- All behaviour lives in app.js (loaded last, so the DOM above exists) -->
<script src="app.js"></script>
